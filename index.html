<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>StarWarsRP · Навигатор</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, 'Segoe UI', Roboto, sans-serif; }
    :root {
        --bg: #0a1a20;
        --panel: #10333d;
        --panel-2: #0c2731;
        --line: #2d6775;
        --accent: #6fc1d6;
        --me: #4fd0ff;
        --target: #ffd24a;
        --text: #dff1f5;
        --muted: #7fb2c0;
    }
    html, body { height: 100%; }
    body {
        background: radial-gradient(circle at 50% 0%, #12333d, #08151a);
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 10px;
        gap: 10px;
        user-select: none;
        min-height: 100%;
    }

    .bar {
        width: 100%;
        max-width: 900px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 8px 12px;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px 14px;
    }
    .title { font-weight: 300; font-size: 1.05rem; letter-spacing: .5px; }
    .title b { font-weight: 600; }
    .map-badge {
        display: inline-block; margin-left: 6px; padding: 2px 9px;
        font-size: .72rem; font-weight: 600; letter-spacing: .5px;
        background: #1c4e5c; border: 1px solid #4f97a8; border-radius: 20px; color: var(--accent);
    }
    .spacer { flex: 1; }

    .field-ctl { display: flex; align-items: center; gap: 6px; font-size: .85rem; color: var(--muted); }
    .field-ctl input {
        width: 66px; padding: 5px 8px; text-align: center;
        border: 1px solid #3f8090; border-radius: 8px;
        background: #123f4b; color: var(--text); font-size: .95rem; font-weight: 600;
        outline: none;
    }
    .field-ctl input:focus { border-color: var(--accent); background: #16505f; }
    .field-ctl select {
        padding: 5px 8px; border: 1px solid #3f8090; border-radius: 8px;
        background: #123f4b; color: var(--text); font-size: .9rem; font-weight: 600;
        outline: none; cursor: pointer;
    }
    .field-ctl select:focus { border-color: var(--accent); background: #16505f; }

    .phase-toggle { display: inline-flex; border: 1px solid #3f8090; border-radius: 8px; overflow: hidden; }
    .phase-toggle button {
        background: #123f4b; color: var(--muted); border: none; border-radius: 0;
        padding: 5px 12px; font-size: .82rem; font-weight: 600;
    }
    .phase-toggle button + button { border-left: 1px solid #3f8090; }
    .phase-toggle button.active { background: var(--accent); color: #08151a; }
    .phase-toggle button:hover:not(.active) { background: #16505f; color: var(--text); }

    button {
        background: #2f6474; color: #fff; border: 1px solid #4f97a8;
        padding: 6px 14px; border-radius: 9px; font-size: .82rem; font-weight: 500;
        cursor: pointer; transition: .12s;
    }
    button:hover { background: #3d8496; }
    button:active { transform: scale(.96); }
    button.danger { background: #7a3d3d; border-color: #b06a6a; }
    button.danger:hover { background: #984c4c; }

    .stage {
        width: 100%;
        max-width: 900px;
        aspect-ratio: 1 / 1;
        position: relative;
        background: var(--panel-2);
        border: 1px solid var(--line);
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0,0,0,.5);
    }
    #map { position: absolute; inset: 0; width: 100%; height: 100%; display: block; cursor: crosshair; touch-action: none; }

    .zoom-ctl {
        position: absolute; right: 10px; bottom: 10px;
        display: flex; flex-direction: column; gap: 6px; z-index: 5;
    }
    .zoom-ctl button {
        width: 38px; height: 38px; padding: 0; font-size: 1.15rem; line-height: 1;
        border-radius: 10px; background: rgba(16,51,61,0.85); border: 1px solid #4f97a8;
        backdrop-filter: blur(3px);
    }
    .zoom-ctl .zlvl {
        text-align: center; font-size: .62rem; color: var(--muted);
        background: rgba(12,39,49,0.8); border: 1px solid var(--line);
        border-radius: 8px; padding: 2px 0;
    }

    .results {
        width: 100%;
        max-width: 900px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 8px;
    }
    .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 8px 12px;
    }
    .card .lbl { font-size: .62rem; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); }
    .card .val { font-size: 1.35rem; font-weight: 600; margin-top: 2px; font-feature-settings: "tnum"; }
    .card .val small { font-size: .7rem; font-weight: 300; color: var(--muted); }
    .card.me   { border-left: 3px solid var(--me); }
    .card.target { border-left: 3px solid var(--target); }
    .dot { display:inline-block; width:9px; height:9px; border-radius:50%; vertical-align:middle; margin-right:4px; }
    .dot.me { background: var(--me); } .dot.target { background: var(--target); }

    .hint { font-size: .75rem; color: var(--muted); }
    .compass-note b { color: var(--target); }

    /* маршрут: точки + таблица участков */
    .results.path { display: block; }
    .path-points {
        background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
        padding: 8px 12px; margin-bottom: 8px; font-size: .95rem; font-weight: 600;
        display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
    }
    .path-points .lbl { font-size: .62rem; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); font-weight: 600; margin-right: 4px; }
    .path-points .pt { color: var(--me); }
    .path-points .pt:last-child { color: var(--target); }
    .path-points .arrow { color: var(--muted); font-weight: 300; }
    .seg-table {
        width: 100%; border-collapse: collapse; overflow: hidden;
        background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    }
    .seg-table th, .seg-table td { padding: 7px 12px; text-align: left; font-size: .9rem; }
    .seg-table thead th {
        font-size: .62rem; text-transform: uppercase; letter-spacing: .6px;
        color: var(--muted); font-weight: 600; border-bottom: 1px solid var(--line);
    }
    .seg-table tbody tr + tr td { border-top: 1px solid rgba(45,103,117,0.4); }
    .seg-table td.seg { color: var(--accent); font-weight: 600; }
    .seg-table td small { color: var(--muted); font-weight: 300; }
    .seg-table tr.total td {
        border-top: 2px solid var(--line); font-weight: 700; color: var(--target);
        background: var(--panel-2);
    }
    .empty-note {
        grid-column: 1 / -1; color: var(--muted); font-size: .85rem;
        padding: 10px 4px;
    }
</style>
</head>
<body>

<div class="bar">
    <div class="title">🧭 <b>StarWarsRP</b> · навигатор</div>
    <div class="field-ctl">
        <label>Фаза</label>
        <div class="phase-toggle" id="phaseToggle">
            <button type="button" data-phase="1">Phase-1</button>
            <button type="button" data-phase="2">Phase-2</button>
        </div>
    </div>
    <div class="field-ctl">
        <label for="mapSelect">Карта</label>
        <select id="mapSelect"></select>
    </div>
    <div class="spacer"></div>
    <div class="field-ctl">
        <label>Тип</label>
        <div class="phase-toggle" id="typeToggle">
            <button type="button" data-cat="clone">Клон</button>
            <button type="button" data-cat="transport">Транспорт</button>
            <button type="button" data-cat="weapon">Оружие</button>
        </div>
    </div>
    <div class="field-ctl">
        <label for="modeSelect" id="modeLabel">Режим</label>
        <select id="modeSelect"></select>
    </div>
    <div class="field-ctl" id="speedCtl" style="display:none">
        <label for="speedSelect">Скорость</label>
        <select id="speedSelect"></select>
    </div>
    <div class="field-ctl" id="calibCtl" style="display:none">
        <label for="calibInput" id="calibLabel">Калибровка</label>
        <input type="number" id="calibInput" step="0.01" min="0" placeholder="—">
        <span>с/кл</span>
    </div>
</div>

<div class="bar">
    <div class="field-ctl">
        <label for="cellSize">Сторона клетки</label>
        <input type="number" id="cellSize" value="132" min="0.1" step="1">
        <span>ед.</span>
    </div>
    <div class="spacer"></div>
    <button id="northBtn" title="Повернуть север на 90°">🧭 Север: →</button>
    <button id="undoBtn" title="Убрать последнюю точку">↶ Убрать последнюю</button>
    <button id="clearBtn" class="danger">✕ Сброс</button>
</div>

<div class="stage">
    <canvas id="map"></canvas>
    <div class="zoom-ctl">
        <button id="zoomIn" title="Приблизить">+</button>
        <div class="zlvl" id="zoomLvl">1.0×</div>
        <button id="zoomOut" title="Отдалить">−</button>
        <button id="zoomReset" title="Сбросить вид">⟲</button>
    </div>
</div>

<div class="results" id="results"></div>

<div class="bar" style="justify-content:center; gap:16px;">
    <span class="hint" id="hintText"></span>
    <span class="hint compass-note" id="compassNote"></span>
</div>

<script>
(function () {
    const LETTERS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const canvas = document.getElementById('map');
    const ctx = canvas.getContext('2d');
    const cellSizeInput = document.getElementById('cellSize');
    const clearBtn = document.getElementById('clearBtn');
    const stage = document.querySelector('.stage');

    // ---- конфигурация карт ----
    // cols: столбцов (числа 1..cols); rows: строк (буквы A..)
    // rowsFromTop: true — строка A сверху; false — строка A снизу
    // ownLabels: true — рисовать свою сетку и подписи (легенда обрезана);
    //            false — подписи уже впечатаны в изображение
    // phase: номер фазы (1 или 2) — для группировки в переключателе фаз
    const MAPS = [
        { id: 'mcb',      name: 'МЦБ-17/9/3-18',       file: 'field.jpg',           cols: 15, rows: 15, rowsFromTop: true,  ownLabels: true,  cellSide: 132, phase: 2 },
        { id: 'tat',      name: 'Татуин',              file: 'tatooine.png',        cols: 14, rows: 14, rowsFromTop: false, ownLabels: false, cellSide: 132, phase: 2 },
        { id: 'tatc',     name: 'Татуин - город',      file: 'tatooine-city.png',   cols: 14, rows: 14, rowsFromTop: false, ownLabels: false, cellSide: 132, phase: 2 },
        { id: 'alderaan', name: 'Альдераан',           file: 'alderaan.png',        cols: 14, rows: 14, rowsFromTop: false, ownLabels: false, cellSide: 132, phase: 2 },
        { id: 'anaxes',   name: 'Анаксес',             file: 'anaxes.png',          cols: 14, rows: 14, rowsFromTop: false, ownLabels: false, cellSide: 132, phase: 2 },
        { id: 'felucia',  name: 'Фелуция',             file: 'feluciya.png',        cols: 14, rows: 14, rowsFromTop: false, ownLabels: false, cellSide: 132, phase: 2 },
        { id: 'geo',      name: 'Джеонозис - улитка',  file: 'jeonozis.png',        cols: 14, rows: 14, rowsFromTop: false, ownLabels: false, cellSide: 132, phase: 2 },
        { id: 'geo-base', name: 'Джеонозис - база',    file: 'jeonozis-base.png',   cols: 14, rows: 14, rowsFromTop: false, ownLabels: false, cellSide: 132, phase: 2 },
        { id: 'geo-fact', name: 'Джеонозис - завод',   file: 'jeonozis-factory.png',cols: 14, rows: 14, rowsFromTop: false, ownLabels: false, cellSide: 132, phase: 2 },
        { id: 'geo-main', name: 'Джеонозис - гл.улей', file: 'jeonozis-main.png',   cols: 14, rows: 14, rowsFromTop: false, ownLabels: false, cellSide: 132, phase: 2 },
        { id: 'cor-under',name: 'Корусант - подземный',file: 'koresant-under.png',  cols: 14, rows: 14, rowsFromTop: false, ownLabels: false, cellSide: 132, phase: 2 },
        { id: 'rishi',    name: 'Луна Риши',           file: 'luna-rishi.png',      cols: 14, rows: 14, rowsFromTop: false, ownLabels: false, cellSide: 132, phase: 2 },
        { id: 'mygeeto',  name: 'Мигетто',             file: 'migetto.png',         cols: 14, rows: 14, rowsFromTop: false, ownLabels: false, cellSide: 132, phase: 2 },
        { id: 'mygeeto2', name: 'Мигетто-2',           file: 'migetto-2.png',       cols: 14, rows: 14, rowsFromTop: false, ownLabels: false, cellSide: 132, phase: 2 },
        { id: 'moraband', name: 'Морабанд',            file: 'moraband.png',        cols: 14, rows: 14, rowsFromTop: false, ownLabels: false, cellSide: 132, phase: 2 },
        { id: 'nabu-ang', name: 'Набу - ангар',        file: 'nabu-angar.png',      cols: 14, rows: 14, rowsFromTop: false, ownLabels: false, cellSide: 132, phase: 2 },
        { id: 'nabu-tr',  name: 'Набу - лес',          file: 'nabu-tree.png',       cols: 14, rows: 14, rowsFromTop: false, ownLabels: false, cellSide: 132, phase: 2 },
        { id: 'renvar',   name: 'Рен Вар',             file: 'renvar.png',          cols: 14, rows: 14, rowsFromTop: false, ownLabels: false, cellSide: 132, phase: 2 },
        { id: 'renvar-mt',name: 'Рен Вар - горы',      file: 'renvar-mountain.png', cols: 14, rows: 14, rowsFromTop: false, ownLabels: false, cellSide: 132, phase: 2 },
        { id: 'ryloth',   name: 'Рилот',               file: 'rilot.png',           cols: 14, rows: 14, rowsFromTop: false, ownLabels: false, cellSide: 132, phase: 2 },
        { id: 'takodana', name: 'Такодана',            file: 'takodana.png',        cols: 14, rows: 14, rowsFromTop: false, ownLabels: false, cellSide: 132, phase: 2 },
        { id: 'utapau',   name: 'Утапау',              file: 'utapau.png',          cols: 14, rows: 14, rowsFromTop: false, ownLabels: false, cellSide: 132, phase: 2 },
    ];
    let map = MAPS[0];

    // ---- типы и режимы ----
    // kind: 'path' — маршрут из N точек (клон/транспорт), считает время;
    //       'ballistic' — 2 точки я→цель (оружие), считает азимут.
    // secPerCell    — секунд на клетку (клон/пешком/бег); задать после замеров.
    // speeds        — если задан, добавляется выбор скорости; тогда у режима
    //                 secPerCell100 (сек/клетку при скорости 100), а при другой
    //                 скорости время считается математически: ×100/скорость.
    const CATEGORIES = {
        clone: {
            label: 'Клон', kind: 'path', modeLabel: 'Режим',
            modes: [
                { id: 'walk', name: 'Пешком',      secPerCell: 97.78 },
                { id: 'jog',  name: 'Лёгкий бег',  secPerCell: 34.22 },
                { id: 'run',  name: 'Быстрый бег', secPerCell: 21.51 },
            ],
        },
        transport: {
            label: 'Транспорт', kind: 'path', modeLabel: 'Транспорт',
            speeds: [100, 200, 300, 400, 500, 600, 700, 800, 900, 1000],
            modes: [
                { id: 'laat',   name: 'LAAT/i',  secPerCell100: 18.12 },
                { id: 'arc170', name: 'ARC-170', secPerCell100: 10.871 },
                { id: 'tx130',  name: 'TX-130',  secPerCell100: null },
                { id: 'atrt',   name: 'AT-RT',   secPerCell100: null },
            ],
        },
        weapon: {
            label: 'Оружие', kind: 'ballistic', modeLabel: 'Режим',
            modes: [
                { id: 'mortar', name: 'Миномёт' },
            ],
        },
    };

    const bg = new Image();
    let bgReady = false;
    bg.onload = () => {
        bgReady = true;
        stage.style.aspectRatio = bg.naturalWidth + ' / ' + bg.naturalHeight;
        resize();
    };

    let cellSide = 132;
    let points = [];     // массив {x,y} в норм-координатах поля [0..1]
    let currentCat = CATEGORIES.clone;   // текущий тип
    let currentMode = currentCat.modes[0];

    function loadMap(m) {
        map = m;
        cellSide = m.cellSide;
        cellSizeInput.value = m.cellSide;
        points = [];
        scale = 1; offX = 0; offY = 0;
        document.getElementById('zoomLvl').textContent = '1.0×';
        bgReady = false;
        bg.src = m.file;
        update();
    }

    // направление севера: 0=вправо(→), 1=вниз(↓), 2=влево(←), 3=вверх(↑)
    let northDir = 0;
    const DIR_ARROW = ['→', '↓', '←', '↑'];
    const DIR_WORD  = ['вправо', 'вниз', 'влево', 'вверх'];

    // ---- вид (зум/панорама) в устройственных пикселях canvas ----
    let scale = 1, offX = 0, offY = 0;
    const MIN_SCALE = 1, MAX_SCALE = 12;

    function clampView() {
        scale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale));
        const W = canvas.width, H = canvas.height;
        offX = Math.min(0, Math.max(W - W * scale, offX));
        offY = Math.min(0, Math.max(H - H * scale, offY));
    }
    function zoomAt(deviceX, deviceY, factor) {
        const old = scale;
        scale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale * factor));
        const k = scale / old;
        offX = deviceX - (deviceX - offX) * k;
        offY = deviceY - (deviceY - offY) * k;
        clampView();
        document.getElementById('zoomLvl').textContent = scale.toFixed(1) + '×';
        render();
    }

    // ---- размер canvas под дисплей ----
    function resize() {
        const rect = canvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        canvas.width = Math.round(rect.width * dpr);
        canvas.height = Math.round(rect.height * dpr);
        clampView();
        render();
    }

    // ---- координаты клетки из нормализованной точки ----
    function cellLabel(p) {
        let cx = Math.max(0, Math.min(map.cols - 1, Math.floor(p.x * map.cols)));
        let sy = Math.max(0, Math.min(map.rows - 1, Math.floor(p.y * map.rows))); // индекс строки сверху
        const rowIdx = map.rowsFromTop ? sy : (map.rows - 1 - sy);                // индекс буквы
        return LETTERS[rowIdx] + (cx + 1);   // напр. "H8": строка-буква + столбец-число
    }

    // ---- отрисовка ----
    function render() {
        const W = canvas.width, H = canvas.height;
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.clearRect(0, 0, W, H);
        // применяем вид: смещение + масштаб
        ctx.setTransform(scale, 0, 0, scale, offX, offY);

        if (bgReady) ctx.drawImage(bg, 0, 0, W, H);
        else { ctx.fillStyle = '#123'; ctx.fillRect(0, 0, W, H); }

        // сетка (толщина/шрифт компенсируют масштаб — постоянный экранный размер)
        const s = scale;
        if (map.ownLabels) {
            ctx.lineWidth = 1 / s;
            ctx.strokeStyle = 'rgba(140,200,215,0.18)';
            ctx.font = `${(H/70)/s}px system-ui`;
            ctx.fillStyle = 'rgba(200,235,245,0.7)';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            for (let i = 0; i <= map.cols; i++) {
                const x = i / map.cols * W;
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
            }
            for (let i = 0; i <= map.rows; i++) {
                const y = i / map.rows * H;
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
            }
            // подписи столбцов/строк держим у видимого края canvas
            const edgeX = Math.max(0, -offX / s), edgeY = Math.max(0, -offY / s);
            for (let i = 0; i < map.cols; i++) {
                const cx = (i + 0.5) / map.cols * W;
                ctx.textAlign = 'center'; ctx.textBaseline = 'top';
                ctx.fillText(i + 1, cx, edgeY + 3 / s);        // номера столбцов сверху
            }
            for (let i = 0; i < map.rows; i++) {
                const cy = (i + 0.5) / map.rows * H;
                const letter = LETTERS[map.rowsFromTop ? i : (map.rows - 1 - i)];
                ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
                ctx.fillText(letter, edgeX + 4 / s, cy);       // буквы строк слева
            }
        }

        // линия пути (по всем точкам подряд)
        if (points.length >= 2) {
            ctx.beginPath();
            ctx.moveTo(points[0].x * W, points[0].y * H);
            for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x * W, points[i].y * H);
            ctx.strokeStyle = 'rgba(230,245,255,0.9)';
            ctx.lineWidth = 2 / s;
            ctx.setLineDash([8 / s, 6 / s]);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // точки с подписями
        points.forEach((p, i) => {
            const st = pointStyle(i, points.length);
            drawPoint(p, st.color, st.label);
        });

        drawCompass();
    }

    // цвет и подпись точки: старт — голубой, финиш — жёлтый, промежуточные — акцент
    function pointStyle(i, n) {
        if (currentCat.kind === 'ballistic') {
            return i === 0 ? { color: '#4fd0ff', label: 'Я' } : { color: '#ffd24a', label: 'Цель' };
        }
        if (i === 0)       return { color: '#4fd0ff', label: '1' };
        if (i === n - 1)   return { color: '#ffd24a', label: String(n) };
        return { color: '#6fc1d6', label: String(i + 1) };
    }

    // компас-HUD: стрелка на север, фиксирован в углу (без учёта зума/панорамы)
    function drawCompass() {
        const W = canvas.width;
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        const R = Math.max(24, W / 22);
        const cx = W - R - R * 0.6, cy = R + R * 0.6;
        const a = northDir * Math.PI / 2;          // угол севера (0=вправо, y вниз)
        const nx = Math.cos(a), ny = Math.sin(a);

        ctx.beginPath();
        ctx.arc(cx, cy, R, 0, 2 * Math.PI);
        ctx.fillStyle = 'rgba(8,21,26,0.6)';
        ctx.fill();
        ctx.lineWidth = 1.5; ctx.strokeStyle = 'rgba(120,190,205,0.7)'; ctx.stroke();

        // стрелка N (красный конец) / хвост (серый)
        ctx.lineWidth = Math.max(2, R / 9);
        ctx.strokeStyle = '#ff6060';
        ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + nx * R * 0.7, cy + ny * R * 0.7); ctx.stroke();
        ctx.strokeStyle = 'rgba(200,225,235,0.6)';
        ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx - nx * R * 0.5, cy - ny * R * 0.5); ctx.stroke();

        // буква N у острия
        ctx.fillStyle = '#ff8080';
        ctx.font = `bold ${R * 0.55}px system-ui`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('N', cx + nx * (R + R * 0.35), cy + ny * (R + R * 0.35));
    }

    function drawPoint(p, color, label) {
        if (!p) return;
        const W = canvas.width, H = canvas.height, s = scale;
        const x = p.x * W, y = p.y * H;
        const r = Math.max(6, W / 130) / s;   // постоянный экранный размер
        ctx.beginPath();
        ctx.arc(x, y, r, 0, 2 * Math.PI);
        ctx.fillStyle = color;
        ctx.shadowColor = color; ctx.shadowBlur = 12 / s;
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.lineWidth = 2 / s; ctx.strokeStyle = '#08151a'; ctx.stroke();
        ctx.fillStyle = '#fff';
        ctx.font = `bold ${(W/60)/s}px system-ui`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
        ctx.lineWidth = 3 / s; ctx.strokeStyle = 'rgba(0,0,0,0.6)';
        ctx.strokeText(label, x, y - r - 3 / s);
        ctx.fillText(label, x, y - r - 3 / s);
    }

    // ---- вычисления ----
    // метрика участка между двумя норм-точками; клетки квадратные — корректно при любом cols/rows
    function segMetrics(a, b) {
        const vx = (b.x - a.x) * map.cols;   // экран вправо = +
        const vy = (b.y - a.y) * map.rows;   // экран вниз = +
        const distCells = Math.hypot(vx, vy);
        const distUnits = distCells * cellSide;
        let az = Math.atan2(vy, vx) * 180 / Math.PI - northDir * 90;  // 0° = север
        az = ((az % 360) + 360) % 360;
        return { distCells, distUnits, az };
    }
    // секунд на клетку для текущего режима (с учётом выбранной скорости)
    function currentSecPerCell() {
        if (currentCat.speeds) {
            const base = currentMode.secPerCell100;   // сек/клетку при скорости 100
            return base == null ? null : base * 100 / currentSpeed;
        }
        return currentMode.secPerCell;
    }
    function fmtTime(distCells) {
        const spc = currentSecPerCell();
        if (spc == null) return '—';
        return (distCells * spc).toFixed(1) + ' с';
    }

    const results = document.getElementById('results');

    function update() {
        if (currentCat.kind === 'ballistic') renderBallistic();
        else renderPath();
        render();
    }

    function card(cls, lbl, val) {
        return `<div class="card ${cls}"><div class="lbl">${lbl}</div><div class="val">${val}</div></div>`;
    }

    // оружие: я → цель, расстояние + азимут
    function renderBallistic() {
        results.className = 'results';
        const me = points[0], target = points[1];
        let dist = '— <small>ед.</small>', az = '— <small>°</small>';
        if (me && target) {
            const m = segMetrics(me, target);
            dist = m.distUnits.toFixed(1) + ' <small>ед. · ' + m.distCells.toFixed(2) + ' кл.</small>';
            az = m.az.toFixed(1) + ' <small>°</small>';
        }
        results.innerHTML =
            card('me', '<span class="dot me"></span>Моя позиция', me ? cellLabel(me) : '—') +
            card('target', '<span class="dot target"></span>Цель', target ? cellLabel(target) : '—') +
            card('', '📏 Расстояние', dist) +
            card('', '🧭 Азимут', az);
    }

    // клон/транспорт: маршрут, участки + итог
    function renderPath() {
        results.className = 'results path';
        if (points.length === 0) {
            results.innerHTML = '<div class="empty-note">Кликни по карте, чтобы поставить первую точку маршрута.</div>';
            return;
        }
        // строка точек
        const ptsHtml = points.map((p, i) =>
            (i ? '<span class="arrow">→</span>' : '') + '<span class="pt">' + cellLabel(p) + '</span>'
        ).join(' ');

        // участки
        let rows = '', totCells = 0, totUnits = 0;
        for (let i = 0; i + 1 < points.length; i++) {
            const m = segMetrics(points[i], points[i + 1]);
            totCells += m.distCells; totUnits += m.distUnits;
            rows += '<tr>' +
                '<td class="seg">' + (i + 1) + '→' + (i + 2) + '</td>' +
                '<td>' + m.distUnits.toFixed(1) + ' <small>ед. · ' + m.distCells.toFixed(2) + ' кл.</small></td>' +
                '<td>' + fmtTime(m.distCells) + '</td>' +
                '<td>' + m.az.toFixed(1) + '°</td>' +
                '</tr>';
        }
        let table = '';
        if (points.length >= 2) {
            table =
                '<table class="seg-table"><thead><tr>' +
                '<th>Участок</th><th>Расстояние</th><th>Время</th><th>Азимут</th>' +
                '</tr></thead><tbody>' + rows +
                '<tr class="total"><td>ИТОГО</td>' +
                '<td>' + totUnits.toFixed(1) + ' <small>ед. · ' + totCells.toFixed(2) + ' кл.</small></td>' +
                '<td>' + fmtTime(totCells) + '</td>' +
                '<td>—</td></tr>' +
                '</tbody></table>';
        } else {
            table = '<div class="empty-note">Добавь ещё точку, чтобы получить участок.</div>';
        }
        results.innerHTML =
            '<div class="path-points"><span class="lbl">Точки</span>' + ptsHtml + '</div>' + table;
    }

    // ---- ввод ----
    function eventToDevice(e) {
        const rect = canvas.getBoundingClientRect();
        const src = e.touches && e.touches.length ? e.touches[0] : e;
        return {
            x: (src.clientX - rect.left) * (canvas.width / rect.width),
            y: (src.clientY - rect.top) * (canvas.height / rect.height)
        };
    }
    function eventToNorm(e) {
        const d = eventToDevice(e);
        const baseX = (d.x - offX) / scale;
        const baseY = (d.y - offY) / scale;
        return {
            x: Math.max(0, Math.min(1, baseX / canvas.width)),
            y: Math.max(0, Math.min(1, baseY / canvas.height))
        };
    }

    let dragging = null; // индекс перетаскиваемой точки
    let panning = false, panLast = null;
    function hitTest(p) {
        const thr = 0.03 / scale;   // порог захвата точки в норм-координатах (учёт зума)
        // ищем ближайшую с конца, чтобы верхние точки перехватывались первыми
        for (let i = points.length - 1; i >= 0; i--) {
            if (Math.hypot(points[i].x - p.x, points[i].y - p.y) < thr) return i;
        }
        return null;
    }

    function onDown(e) {
        // панорама: ПКМ, средняя кнопка или Ctrl
        if (e.button === 2 || e.button === 1 || e.ctrlKey) {
            e.preventDefault();
            panning = true; panLast = eventToDevice(e);
            return;
        }
        e.preventDefault();
        const p = eventToNorm(e);
        const hit = hitTest(p);
        if (hit !== null) { dragging = hit; return; }
        if (currentCat.kind === 'ballistic') {
            if (points.length < 2) points.push(p);
            else points = [p];               // 3-й клик — новая позиция
        } else {
            points.push(p);                  // маршрут — добавить точку в конец
        }
        update();
    }
    function onMove(e) {
        if (panning) {
            const d = eventToDevice(e);
            offX += d.x - panLast.x; offY += d.y - panLast.y;
            panLast = d; clampView(); render();
            return;
        }
        if (dragging === null) return;
        e.preventDefault();
        points[dragging] = eventToNorm(e);
        update();
    }
    function onUp() { dragging = null; panning = false; }

    canvas.addEventListener('mousedown', onDown);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    canvas.addEventListener('contextmenu', (e) => e.preventDefault());

    // колесо — зум под курсором
    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const d = eventToDevice(e);
        zoomAt(d.x, d.y, e.deltaY < 0 ? 1.15 : 1 / 1.15);
    }, { passive: false });

    // ---- сенсор: 1 палец — точка/перетаскивание, 2 пальца — зум+панорама ----
    let pinch = null;
    function touchDist(t) { return Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY); }
    function touchMid(t) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: ((t[0].clientX + t[1].clientX) / 2 - rect.left) * (canvas.width / rect.width),
            y: ((t[0].clientY + t[1].clientY) / 2 - rect.top) * (canvas.height / rect.height)
        };
    }
    canvas.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) { pinch = { d: touchDist(e.touches), m: touchMid(e.touches) }; return; }
        onDown(e);
    }, { passive: false });
    canvas.addEventListener('touchmove', (e) => {
        if (e.touches.length === 2 && pinch) {
            e.preventDefault();
            const nd = touchDist(e.touches), nm = touchMid(e.touches);
            zoomAt(nm.x, nm.y, nd / pinch.d);
            offX += nm.x - pinch.m.x; offY += nm.y - pinch.m.y; clampView(); render();
            pinch = { d: nd, m: nm };
            return;
        }
        onMove(e);
    }, { passive: false });
    window.addEventListener('touchend', (e) => { if (e.touches.length === 0) pinch = null; onUp(); });

    // кнопки зума
    function centerDevice() { return { x: canvas.width / 2, y: canvas.height / 2 }; }
    document.getElementById('zoomIn').addEventListener('click', () => { const c = centerDevice(); zoomAt(c.x, c.y, 1.4); });
    document.getElementById('zoomOut').addEventListener('click', () => { const c = centerDevice(); zoomAt(c.x, c.y, 1 / 1.4); });
    document.getElementById('zoomReset').addEventListener('click', () => {
        scale = 1; offX = 0; offY = 0; clampView();
        document.getElementById('zoomLvl').textContent = '1.0×'; render();
    });

    cellSizeInput.addEventListener('input', () => {
        const v = parseFloat(cellSizeInput.value);
        if (!isNaN(v) && v > 0) { cellSide = v; update(); }
    });
    clearBtn.addEventListener('click', () => { points = []; update(); });
    document.getElementById('undoBtn').addEventListener('click', () => { points.pop(); update(); });

    // ---- направление севера ----
    function updateCompassNote() {
        // по часовой от севера: N, E, S, W
        const dirs = ['N', 'E', 'S', 'W'];
        const words = [];
        for (let k = 0; k < 4; k++) {
            words.push(`<b>${dirs[k]}</b>=${k*90}° (${DIR_WORD[(northDir + k) % 4]})`);
        }
        document.getElementById('compassNote').innerHTML = words.join(', ');
        document.getElementById('northBtn').innerHTML = '🧭 Север: ' + DIR_ARROW[northDir];
    }
    document.getElementById('northBtn').addEventListener('click', () => {
        northDir = (northDir + 1) % 4;
        updateCompassNote();
        update();
    });

    // ---- выбор типа (клон/транспорт/оружие), режима и скорости ----
    const typeToggle = document.getElementById('typeToggle');
    const modeSelect = document.getElementById('modeSelect');
    const modeLabel = document.getElementById('modeLabel');
    const speedCtl = document.getElementById('speedCtl');
    const speedSelect = document.getElementById('speedSelect');
    const calibCtl = document.getElementById('calibCtl');
    const calibLabel = document.getElementById('calibLabel');
    const calibInput = document.getElementById('calibInput');
    const undoBtn = document.getElementById('undoBtn');
    const hintText = document.getElementById('hintText');
    let currentSpeed = 100;

    const HINTS = {
        path: 'ЛКМ — добавить точку маршрута · перетащить точку — сдвинуть · «↶ Убрать последнюю» / «Сброс» · колесо — зум · ПКМ/Ctrl — панорама',
        ballistic: 'ЛКМ — точка · перетащить точку — сдвинуть · 3-й клик — новая позиция · колесо — зум · ПКМ/Ctrl — панорама',
    };

    // калибровка сек/клетку для текущего режима — редактируется прямо на странице,
    // без правки кода (аналогично полю «Сторона клетки»)
    function updateCalibUI() {
        if (currentCat.kind !== 'path') { calibCtl.style.display = 'none'; return; }
        calibCtl.style.display = '';
        calibLabel.textContent = currentCat.speeds ? 'Калибровка (@100)' : 'Калибровка';
        const v = currentCat.speeds ? currentMode.secPerCell100 : currentMode.secPerCell;
        calibInput.value = v == null ? '' : v;
    }

    function setMode(i) {
        currentMode = currentCat.modes[i] || currentCat.modes[0];
        updateCalibUI();
        update();
    }

    function setCategory(catKey) {
        currentCat = CATEGORIES[catKey];
        Array.from(typeToggle.children).forEach(b => {
            b.classList.toggle('active', b.dataset.cat === catKey);
        });
        // заполнить режимы
        modeLabel.textContent = currentCat.modeLabel;
        modeSelect.innerHTML = '';
        currentCat.modes.forEach((m, i) => {
            const opt = document.createElement('option');
            opt.value = i; opt.textContent = m.name;
            modeSelect.appendChild(opt);
        });
        modeSelect.value = 0;
        currentMode = currentCat.modes[0];
        // выбор скорости — только если у категории есть speeds
        if (currentCat.speeds) {
            speedSelect.innerHTML = '';
            currentCat.speeds.forEach(sp => {
                const opt = document.createElement('option');
                opt.value = sp; opt.textContent = sp;
                speedSelect.appendChild(opt);
            });
            currentSpeed = currentCat.speeds[0];
            speedSelect.value = currentSpeed;
            speedCtl.style.display = '';
        } else {
            speedCtl.style.display = 'none';
        }
        // оружие — максимум 2 точки: обрежем лишние при переключении
        if (currentCat.kind === 'ballistic' && points.length > 2) points = points.slice(0, 2);
        undoBtn.style.display = currentCat.kind === 'path' ? '' : 'none';
        hintText.textContent = HINTS[currentCat.kind];
        updateCalibUI();
        update();
    }

    modeSelect.addEventListener('change', () => setMode(+modeSelect.value));
    speedSelect.addEventListener('change', () => { currentSpeed = +speedSelect.value; update(); });
    typeToggle.addEventListener('click', (e) => {
        const btn = e.target.closest('button[data-cat]');
        if (btn) setCategory(btn.dataset.cat);
    });
    calibInput.addEventListener('input', () => {
        const v = calibInput.value.trim();
        const num = v === '' ? null : parseFloat(v);
        const val = (num == null || isNaN(num)) ? null : num;
        if (currentCat.speeds) currentMode.secPerCell100 = val;
        else currentMode.secPerCell = val;
        update();
    });

    // ---- выбор фазы и карты ----
    const mapSelect = document.getElementById('mapSelect');
    const phaseToggle = document.getElementById('phaseToggle');
    let currentPhase = 2;

    // заполнить список картами текущей фазы; вернуть глобальный индекс первой карты или null
    function populateMapSelect() {
        mapSelect.innerHTML = '';
        const inPhase = MAPS.map((m, i) => ({ m, i })).filter(x => x.m.phase === currentPhase);
        if (inPhase.length === 0) {
            const opt = document.createElement('option');
            opt.textContent = '— карт пока нет —';
            opt.disabled = true; opt.selected = true;
            mapSelect.appendChild(opt);
            mapSelect.disabled = true;
            return null;
        }
        mapSelect.disabled = false;
        inPhase.forEach(({ m, i }) => {
            const opt = document.createElement('option');
            opt.value = i; opt.textContent = m.name;
            mapSelect.appendChild(opt);
        });
        return inPhase[0].i;
    }

    function setPhase(p) {
        currentPhase = p;
        Array.from(phaseToggle.children).forEach(b => {
            b.classList.toggle('active', +b.dataset.phase === p);
        });
        const firstIdx = populateMapSelect();
        if (firstIdx !== null) {
            mapSelect.value = firstIdx;
            loadMap(MAPS[firstIdx]);
        }
    }

    mapSelect.addEventListener('change', () => loadMap(MAPS[+mapSelect.value]));
    phaseToggle.addEventListener('click', (e) => {
        const btn = e.target.closest('button[data-phase]');
        if (btn) setPhase(+btn.dataset.phase);
    });

    window.addEventListener('resize', resize);
    updateCompassNote();
    setCategory('clone');
    setPhase(2);
})();
</script>
</body>
</html>
